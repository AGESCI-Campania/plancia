{% extends "base.html" %}
{% load i18n %}

{% block title %}Password aggiornata — {{ block.super }}{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-12 col-sm-8 col-md-5">
    <div class="card shadow-sm">
      <div class="card-body p-4 text-center">
        <h1 class="h4 card-title mb-3">{% trans "Password aggiornata" %}</h1>
        <p>{% trans "La tua password è stata modificata con successo." %}</p>
        <a href="{% url 'account_login' %}" class="btn btn-primary mt-2">
          {% trans "Accedi" %}
        </a>
      </div>
    </div>
  </div>
</div>
{% endblock %}
