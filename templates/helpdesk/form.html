{% extends "base.html" %}
{% block title %}Nuovo ticket{% endblock %}

{% block content %}
<div class="container py-4" style="max-width:640px">
  <h1 class="h4 mb-3">Apri un ticket di assistenza</h1>
  <form method="post" novalidate>
    {% csrf_token %}
    {% for field in form %}
      <div class="mb-3">
        <label class="form-label fw-semibold">{{ field.label }}</label>
        {{ field }}
        {% if field.errors %}<div class="text-danger small">{{ field.errors }}</div>{% endif %}
      </div>
    {% endfor %}
    <button class="btn btn-primary">Apri ticket</button>
    <a href="{% url 'helpdesk:list' %}" class="btn btn-outline-secondary ms-2">Annulla</a>
  </form>
</div>
{% endblock %}
