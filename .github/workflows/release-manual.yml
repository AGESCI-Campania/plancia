name: Genera manuali PDF e allega alla release

on:
  release:
    types: [published]

jobs:
  build-manuals:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Estrai versione da pyproject.toml
        id: version
        run: |
          VERSION=$(grep '^version' pyproject.toml | sed 's/version = "\(.*\)"/\1/')
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Installa pandoc e xelatex
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            pandoc \
            texlive-xetex \
            texlive-lang-italian \
            texlive-fonts-recommended \
            fonts-liberation

      - name: Genera PDF manuali
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          cd docs/manuale
          DATE=$(date +'%B %Y')

          # Manuale completo (tutti i ruoli)
          pandoc --defaults pandoc-defaults.yaml \
            -V title="Plancia — Manuale d'uso" \
            -V subtitle="Guidoncini Verdi · AGESCI Campania" \
            -V date="$DATE" \
            index.md csq.md crp.md pgv.md incaricato.md segreteria.md admin.md \
            -o plancia_manuale_${VERSION}.pdf

          # Manuale Capo Squadriglia
          pandoc --defaults pandoc-defaults.yaml \
            -V title="Plancia — Guida per il Capo Squadriglia" \
            -V subtitle="Guidoncini Verdi · AGESCI Campania" \
            -V date="$DATE" \
            csq.md \
            -o manuale_csq_${VERSION}.pdf

          # Manuale Capo Reparto
          pandoc --defaults pandoc-defaults.yaml \
            -V title="Plancia — Guida per il Capo Reparto" \
            -V subtitle="Guidoncini Verdi · AGESCI Campania" \
            -V date="$DATE" \
            crp.md \
            -o manuale_crp_${VERSION}.pdf

          # Manuale Valutazione diari (Pattuglia GV + Incaricato EG)
          pandoc --defaults pandoc-defaults.yaml \
            -V title="Plancia — Guida alla Valutazione dei Diari" \
            -V subtitle="Pattuglia GV e Incaricato EG · AGESCI Campania" \
            -V date="$DATE" \
            pgv.md incaricato.md \
            -o manuale_valutazione_${VERSION}.pdf

          # Manuale Amministrazione (Admin, Segreteria, Incaricato EG / IABR)
          pandoc --defaults pandoc-defaults.yaml \
            -V title="Plancia — Guida per l'Amministrazione" \
            -V subtitle="Admin, Segreteria e Incaricato EG · AGESCI Campania" \
            -V date="$DATE" \
            segreteria.md incaricato.md admin.md \
            -o manuale_amministrazione_${VERSION}.pdf

      - name: Allega PDF alla release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            docs/manuale/plancia_manuale_${{ steps.version.outputs.version }}.pdf
            docs/manuale/manuale_csq_${{ steps.version.outputs.version }}.pdf
            docs/manuale/manuale_crp_${{ steps.version.outputs.version }}.pdf
            docs/manuale/manuale_valutazione_${{ steps.version.outputs.version }}.pdf
            docs/manuale/manuale_amministrazione_${{ steps.version.outputs.version }}.pdf
